<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GameRate — Perfil</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <style>
    .perfil-wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

    .perfil-header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .perfil-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface2);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      flex-shrink: 0;
    }
    .perfil-name { font-size: 24px; font-weight: 700; }
    .perfil-role { font-size: 14px; font-weight: 600; margin: 2px 0 8px; }
    .perfil-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .perfil-seguidores { font-size: 14px; color: var(--muted); margin-left: auto; white-space: nowrap; }

    .section-divider { font-size: 16px; font-weight: 700; margin: 24px 0 14px; }

    .my-review-item {
      display: flex;
      gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .my-review-item:last-child { border-bottom: none; }
    .my-review-cover {
      width: 60px;
      min-width: 60px;
      height: 80px;
      border-radius: 4px;
      object-fit: cover;
      background: var(--surface2);
    }
    .my-review-body  { flex: 1; min-width: 0; }
    .my-review-game  { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .my-review-text  {
      font-size: 13px;
      color: #c8c8c8;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .my-review-meta { display: flex; gap: 14px; font-size: 13px; color: var(--muted); align-items: center; }
    .my-review-meta button {
      background: none; border: none;
      color: var(--critico); font-size: 13px;
      cursor: pointer; padding: 0;
    }
    .my-review-meta button:hover { text-decoration: underline; }

    .edit-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  </style>
</head>
<body>
<header class="top-bar">
  <a href="../index.html" class="logo"><img src="../assets/logo.svg" alt="GameRate"/></a>
  <div class="search-wrap">
    <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Pesquisar"/>
  </div>
  <nav class="nav-links">
    <a href="./catalogo.html">Jogos</a>
    <a href="./avaliacao-nova.html" class="auth-only nav-criar" style="display:none">Criar Análise</a>
    <a href="./perfil.html" class="auth-only" style="display:none;flex-direction:row;align-items:center;gap:6px;">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0;line-height:1.2;">
        <span class="nav-username" style="font-weight:600;font-size:13px"></span>
        <span class="nav-userrole" style="font-size:11px"></span>
      </div>
    </a>
    <a href="#" data-action="logout" class="auth-only" style="display:none">Sair</a>
    <a href="./login.html" class="guest-only">Login</a>
  </nav>
</header>

<div class="perfil-wrap">
  <div id="perfilHeader">
    <div class="empty-state"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
  </div>

  <div class="tab-bar">
    <div class="tab active" data-tab="analises">Últimas análises</div>
    <div class="tab" data-tab="editar">Editar perfil</div>
  </div>

  <div id="tab-analises">
    <div id="myReviews">
      <div class="empty-state"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="tab-editar" style="display:none">
    <div class="edit-panel">
      <div style="font-size:16px;font-weight:700;margin-bottom:18px">Editar Perfil</div>
      <div class="form-group"><label>Nome de usuário</label><input type="text" id="editNome"/></div>
      <div class="form-group"><label>E-mail</label><input type="email" id="editEmail"/></div>
      <div class="form-group"><label>Nova senha (deixe em branco para manter)</label><input type="password" id="editSenha" placeholder="••••••••"/></div>
      <div id="editErr" class="form-error" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" id="btnSalvar">Salvar alterações</button>
        <span id="adminLink"></span>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <a href="../index.html" class="footer-logo"><img src="../assets/logo.svg" alt="GameRate"/></a>
  <div class="footer-links"><a href="./contato.html">Contato</a></div>
  <div class="footer-copy">© 2025 GameRate</div>
</footer>

<script type="module">
  import { api }                            from '../js/api.js';
  import { getUser, getToken, saveSession,
           isLoggedIn }                     from '../js/auth.js';
  import { setupNav, logout, onDelegated, ROLE_CLASS, starHTML, fmtDate, toast, getBasePath } from '../js/ui.js';

  setupNav();
  if (!isLoggedIn()) location.href = './login.html?next=./perfil.html';

  onDelegated('logout', (el, e) => { e.preventDefault(); logout(); });
  onDelegated('open-game', (el) => { location.href = `./jogo.html?id=${el.dataset.id}`; });

  document.getElementById('searchInput').addEventListener('keyup', (e) => {
    if (e.key === 'Enter') location.href = `./catalogo.html?search=${e.target.value}`;
  });

  document.querySelector('.tab-bar').addEventListener('click', (e) => {
    const tab = e.target.closest('[data-tab]');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    ['analises','editar'].forEach(t =>
      document.getElementById(`tab-${t}`).style.display = t === tab.dataset.tab ? '' : 'none'
    );
  });

  document.getElementById('btnSalvar').addEventListener('click', async () => {
    const nome_usuario = document.getElementById('editNome').value.trim();
    const email  = document.getElementById('editEmail').value.trim();
    const senha  = document.getElementById('editSenha').value;
    const errEl  = document.getElementById('editErr');
    errEl.textContent = '';
    const payload = {};
    if (nome_usuario) payload.nome_usuario = nome_usuario;
    if (email) payload.email = email;
    if (senha) payload.senha = senha;
    const btn = document.getElementById('btnSalvar');
    btn.textContent = 'Salvando...'; btn.disabled = true;
    try {
      await api.put('/usuarios/me', payload);
      if (nome_usuario) {
        const user = getUser();
        saveSession(getToken(), nome_usuario, user.perfil, user.id);
        setupNav();
      }
      toast('Perfil atualizado!', 'success');
      loadPerfil();
    } catch(e) {
      errEl.textContent = e.message;
    } finally {
      btn.textContent = 'Salvar alterações'; btn.disabled = false;
    }
  });

  async function loadPerfil() {
    const u        = await api.get('/usuarios/me');
    const roleClass = ROLE_CLASS[u.nome_perfil] || 'role-jogador';
    const roleName  = u.nome_perfil === 'Crítico Especializado' ? 'Crítico' : u.nome_perfil;

    document.getElementById('perfilHeader').innerHTML = `
      <div class="perfil-header">
        <div class="perfil-avatar">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="perfil-name">${u.nome_usuario}</div>
          <div class="perfil-role ${roleClass}">${roleName}</div>
          <div class="perfil-actions">
            <button class="btn btn-ghost btn-sm" id="btnEditarPerfil">Editar perfil</button>
          </div>
        </div>
        <div class="perfil-seguidores">Seguidores: ${u.total_seguidores || 0}</div>
      </div>`;

    document.getElementById('btnEditarPerfil').addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="editar"]').classList.add('active');
      document.getElementById('tab-analises').style.display = 'none';
      document.getElementById('tab-editar').style.display   = '';
    });

    document.getElementById('editNome').value  = u.nome_usuario;
    document.getElementById('editEmail').value = u.email;
    if (u.nome_perfil === 'Administrador')
      document.getElementById('adminLink').innerHTML = `<a href="./admin.html" class="btn btn-ghost btn-sm">⚙ Painel Admin</a>`;
  }

  async function loadReviews() {
    const rows = await api.get('/usuarios/me/avaliacoes');
    if (!rows.length) {
      document.getElementById('myReviews').innerHTML =
        '<div class="empty-state"><p>Você ainda não fez nenhuma avaliação.</p></div>';
      return;
    }
    const basePath = getBasePath();
    document.getElementById('myReviews').innerHTML = rows.map(a => `
      <div class="my-review-item">
        <img class="my-review-cover" src="${a.capa ? (a.capa.startsWith('http') ? a.capa : basePath + a.capa.replace('./', '')) : ''}" alt="${a.nome_jogo}"
             onerror="this.style.background='var(--surface2)';this.removeAttribute('src')">
        <div class="my-review-body">
          <div class="my-review-game">${a.nome_jogo}</div>
          <div style="font-size:13px;color:var(--star);margin-bottom:4px">${starHTML(a.nota)}</div>
          <div class="my-review-text">${a.texto}</div>
          <div class="my-review-meta">
            <span>👍 ${a.total_curtidas}</span>
            <span>💬 0</span>
            <button data-id="${a.id_avaliacao}" data-action="del-review">🗑</button>
          </div>
        </div>
      </div>`).join('');

    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action="del-review"]');
      if (!btn) return;
      if (!confirm('Excluir esta avaliação?')) return;
      await api.delete(`/avaliacoes/${btn.dataset.id}`);
      toast('Avaliação excluída', 'success');
      loadReviews();
    }, { once: false });
  }

  await Promise.all([loadPerfil(), loadReviews()]);
</script>
</body>
</html>
