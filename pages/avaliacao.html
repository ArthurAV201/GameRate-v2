<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>GameRate — Avaliação</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <style>
    .aval-wrap { max-width: 800px; margin: 0 auto; padding: 32px 24px; }
    .back-link { display: inline-block; color: var(--muted); font-size: 13px; margin-bottom: 20px; text-decoration: underline; }
    .back-link:hover { color: var(--text); }
    .aval-main { border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; background: var(--surface); margin-bottom: 24px; }
    .aval-user-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .aval-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--muted); flex-shrink: 0; }
    .aval-username { font-size: 16px; font-weight: 700; }
    .aval-titulo   { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
    .aval-texto    { font-size: 14px; color: #c8c8c8; line-height: 1.75; white-space: pre-wrap; margin-bottom: 20px; }
    .aval-actions  { display: flex; align-items: center; gap: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .btn-like { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 6px 14px; cursor: pointer; font-size: 14px; }
    .btn-like:hover, .btn-like.liked { background: var(--surface2); color: var(--text); }
    .comments-section { border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; background: var(--surface); }
    .comments-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .comment-form  { display: flex; gap: 8px; margin-bottom: 20px; }
    .comment-form input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
    .comment-form input:focus { border-color: #888; }
    .comment-item  { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .comment-item:last-child { border-bottom: none; }
    .comment-author { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .comment-text   { font-size: 13px; color: #c8c8c8; }
  </style>
</head>
<body>
<header class="top-bar">
  <a href="../index.html" class="logo"><img src="../assets/logo.svg" alt="GameRate"/></a>
  <div class="search-wrap">
    <svg class="ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Pesquisar"/>
  </div>
  <nav class="nav-links">
    <a href="./catalogo.html">Jogos</a>
    <a href="./login.html" class="guest-only">Login</a>
    <a href="./cadastro.html" class="guest-only btn-solid">Registrar</a>
    <a href="./avaliacao-nova.html" class="auth-only nav-criar" style="display:none">Criar Análise</a>
    <a href="./perfil.html" class="auth-only" style="display:none;flex-direction:column;align-items:flex-end;gap:0;line-height:1.2;">
      <span class="nav-username" style="font-weight:600;font-size:13px"></span>
      <span class="nav-userrole" style="font-size:11px"></span>
    </a>
    <a href="#" data-action="logout" class="auth-only" style="display:none">Sair</a>
  </nav>
</header>

<div class="aval-wrap" id="avalWrap">
  <div class="empty-state"><div class="empty-icon">⏳</div><p>Carregando...</p></div>
</div>

<footer class="footer">
  <a href="../index.html" class="footer-logo"><img src="../assets/logo.svg" alt="GameRate"/></a>
  <div class="footer-links"><a href="./contato.html">Contato</a></div>
  <div class="footer-copy">© 2025 GameRate</div>
</footer>

<script type="module">
  import { api }                      from '../js/api.js';
  import { getUser, isLoggedIn }      from '../js/auth.js';
  import { setupNav, logout, onDelegated, ROLE_CLASS, starHTML, fmtDate, toast } from '../js/ui.js';

  setupNav();
  onDelegated('logout', (el, e) => { e.preventDefault(); logout(); });

  const avalId = new URLSearchParams(location.search).get('id');
  if (!avalId) location.href = './catalogo.html';

  document.getElementById('searchInput').addEventListener('keyup', (e) => {
    if (e.key === 'Enter') location.href = `./catalogo.html?search=${e.target.value}`;
  });

  let curtidas = 0;

  async function load() {
    const a         = await api.get(`/avaliacoes/${avalId}`);
    document.title  = `GameRate — ${a.titulo}`;
    curtidas        = a.total_curtidas;
    const roleClass = ROLE_CLASS[a.nome_perfil] || 'role-jogador';
    const roleName  = a.nome_perfil === 'Crítico Especializado' ? 'Crítico' : (a.nome_perfil || 'Jogador');
    const user      = getUser();
    const isOwner   = user && a.id_usuario_fk === parseInt(user.id);

    const commHTML = a.comentarios.length
      ? a.comentarios.map(c => `
          <div class="comment-item">
            <div class="comment-author">@${c.nome_usuario} <span style="color:var(--muted);font-weight:400;font-size:11px">${fmtDate(c.data_comentario)}</span></div>
            <div class="comment-text">${c.texto}</div>
          </div>`).join('')
      : '<div style="color:var(--muted);font-size:13px">Nenhum comentário ainda.</div>';

    document.getElementById('avalWrap').innerHTML = `
      <a href="./jogo.html?id=${a.id_jogo_fk}" class="back-link">← Voltar para ${a.nome_jogo}</a>

      <div class="aval-main">
        <div class="aval-user-row">
          <div class="aval-avatar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="aval-username">${a.nome_usuario}</span>
          <span class="role-badge ${roleClass}">${roleName}</span>
          <span style="font-size:12px;color:var(--muted)">em ${fmtDate(a.data_publicacao)}</span>
        </div>
        <div style="color:var(--star);margin-bottom:12px">${starHTML(a.nota)}</div>
        <div class="aval-titulo">${a.titulo}</div>
        <div class="aval-texto">${a.texto}</div>
        <div class="aval-actions">
          <button class="btn-like" id="btnLike">👍 <span id="likeCount">${curtidas}</span></button>
          ${isOwner ? `<button class="btn btn-danger btn-sm" id="btnExcluir">🗑 Excluir</button>` : ''}
        </div>
      </div>

      <div class="comments-section">
        <div class="comments-title">Comentários (${a.comentarios.length})</div>
        ${isLoggedIn() ? `
          <div class="comment-form">
            <input type="text" id="commentInput" placeholder="Escreva um comentário..."/>
            <button class="btn btn-primary btn-sm" id="btnComentar">Enviar</button>
          </div>` : `
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px">
            <a href="./login.html" style="text-decoration:underline;color:var(--text)">Faça login</a> para comentar.
          </div>`}
        <div id="commentList">${commHTML}</div>
      </div>`;

    document.getElementById('btnLike').addEventListener('click', async () => {
      if (!isLoggedIn()) { location.href = './login.html'; return; }
      const r = await api.post(`/avaliacoes/${avalId}/curtir`);
      curtidas += r.curtiu ? 1 : -1;
      document.getElementById('btnLike').classList.toggle('liked', r.curtiu);
      document.getElementById('likeCount').textContent = curtidas;
    });

    document.getElementById('btnExcluir')?.addEventListener('click', async () => {
      if (!confirm('Excluir esta avaliação?')) return;
      await api.delete(`/avaliacoes/${avalId}`);
      toast('Avaliação excluída', 'success');
      setTimeout(() => location.href = `./jogo.html?id=${a.id_jogo_fk}`, 1200);
    });

    document.getElementById('btnComentar')?.addEventListener('click', async () => {
      const input = document.getElementById('commentInput');
      const texto = input.value.trim();
      if (!texto) return;
      await api.post(`/avaliacoes/${avalId}/comentar`, { texto });
      input.value = '';
      toast('Comentário publicado!', 'success');
      load();
    });
  }

  await load();
</script>
</body>
</html>
